<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Municipalidad de General Lavalle</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    /* ── MOBILE NAV ─────────────────────────────────────── */
    .mobile-nav {
      display: none;
      background: #0f3446;
      position: sticky;
      top: 0;
      z-index: 100;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .mobile-nav::-webkit-scrollbar { display: none; }

    .mobile-nav-inner {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 4px;
      min-width: max-content;
    }

    .mobile-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px 10px 8px;
      text-decoration: none;
      border-right: 1px solid rgba(255,255,255,0.12);
      flex-shrink: 0;
    }

    .mobile-logo img {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    .mobile-logo span {
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
    }

    .mobile-nav-btn {
      display: inline-flex;
      align-items: center;
      padding: 14px 16px;
      background: transparent;
      border: 0;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      font-weight: 600;
      font-family: Arial, Helvetica, sans-serif;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: color 160ms ease, background 160ms ease;
      letter-spacing: 0.3px;
    }

    .mobile-nav-btn:hover,
    .mobile-nav-btn:active {
      color: #fff;
      background: rgba(255,255,255,0.1);
    }

    /* ── SITE / PAGES ───────────────────────────────────── */
    .site {
      width: min(100%, 1920px);
      margin: 0 auto;
      position: relative;
      background: #cfeaf2;
    }

    .page {
      display: none;
      position: relative;
    }

    .page.active {
      display: block;
    }

    .page img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
    }

    /* ── DESKTOP HOTSPOTS ───────────────────────────────── */
    .hotspot {
      position: absolute;
      top: var(--nav-top);
      height: var(--nav-height);
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      font-size: 0;
      color: transparent;
      text-decoration: none;
      z-index: 3;
      transition: transform 160ms ease;
    }

    .hotspot:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.95);
      outline-offset: 2px;
    }

    .hotspot::after,
    .home-link::after {
      content: "";
      position: absolute;
      inset: -6px -10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 6px 16px rgba(16, 54, 70, 0.18);
      opacity: 0;
      transform: translateY(0) scale(0.94);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .hotspot:hover,
    .home-link:hover {
      transform: translateY(-8%);
    }

    .hotspot:hover::after,
    .home-link:hover::after {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .hotspot:active,
    .home-link:active {
      transform: translateY(6%) scale(0.98);
    }

    .municipio { left: 34.8%; width: 8.2%; }
    .contacto  { left: 44.0%; width: 7.5%; }
    .turismo   { left: 52.3%; width: 6.5%; }
    .noticias  { left: 59.4%; width: 7.0%; }
    .hcd       { left: 67.1%; width: 4.2%; }

    .home-link {
      position: absolute;
      left: 2.7%;
      top: var(--logo-top);
      width: 18.2%;
      height: var(--logo-height);
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      font-size: 0;
      color: transparent;
      z-index: 3;
      transition: transform 160ms ease;
    }

    #home {
      --nav-top: 1.7%;
      --nav-height: 1.45%;
      --logo-top: 1.0%;
      --logo-height: 3.2%;
    }

    #hcd {
      --nav-top: 3.25%;
      --nav-height: 2.7%;
      --logo-top: 1.8%;
      --logo-height: 6.0%;
    }

    #contacto {
      --nav-top: 1.58%;
      --nav-height: 1.35%;
      --logo-top: 0.95%;
      --logo-height: 3.0%;
    }

    #municipio {
      --nav-top: 2.72%;
      --nav-height: 2.25%;
      --logo-top: 1.55%;
      --logo-height: 5.0%;
    }

    /* ── MAPA ───────────────────────────────────────────── */
    .real-map {
      position: absolute;
      left: 0;
      top: 64.1%;
      width: 100%;
      height: 11.05%;
      border: 0;
      z-index: 2;
    }

    .map-link-cover {
      position: absolute;
      left: 0;
      top: 75.2%;
      width: 100%;
      height: 1.8%;
      background: #cfeaf2;
      z-index: 2;
      pointer-events: none;
    }

    /* mapa en mobile: fuera del flujo relativo, bloque normal */
    .map-mobile-wrapper {
      display: none;
    }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 1920px) {
      .site {
        width: 100%;
      }
    }

    @media (max-width: 768px) {
      body {
        background: #cfeaf2;
        overflow-x: hidden;
      }

      /* mostrar nav mobile, ocultar hotspots */
      .mobile-nav {
        display: block;
      }

      .hotspot,
      .home-link {
        display: none;
      }

      /* mapa mobile en bloque normal debajo de la imagen */
      .real-map,
      .map-link-cover {
        display: none;
      }

      .map-mobile-wrapper {
        display: block;
        width: 100%;
        height: 220px;
      }

      .map-mobile-wrapper iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }

      .site {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- NAV MOBILE (solo visible en pantallas ≤768px) -->
  <nav class="mobile-nav" aria-label="Navegación móvil">
    <div class="mobile-nav-inner">
      <button class="mobile-logo" onclick="showPage('home')" aria-label="Inicio" style="background:transparent;border:0;cursor:pointer;">
        <span>Municipalidad<br>General Lavalle</span>
      </button>
      <button class="mobile-nav-btn" onclick="showPage('municipio')">Municipio</button>
      <button class="mobile-nav-btn" onclick="showPage('contacto')">Contacto</button>
      <button class="mobile-nav-btn" onclick="showPage('home')">Turismo</button>
      <button class="mobile-nav-btn" onclick="showPage('home')">Noticias</button>
      <button class="mobile-nav-btn" onclick="showPage('hcd')">HCD</button>
    </div>
  </nav>

  <main class="site" aria-label="Municipalidad de General Lavalle">
    <section class="page active" id="home" aria-label="Inicio">
      <img src="images/page_01.jpg" alt="Pagina de inicio de Municipalidad de General Lavalle">
      <iframe
        class="real-map"
        title="Mapa de General Lavalle"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        src="https://www.google.com/maps?q=General%20Lavalle,%20Buenos%20Aires,%20Argentina&output=embed">
      </iframe>
      <span class="map-link-cover" aria-hidden="true"></span>
      <!-- Mapa mobile (debajo de imagen en mobile) -->
      <div class="map-mobile-wrapper">
        <iframe
          title="Mapa de General Lavalle móvil"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps?q=General%20Lavalle,%20Buenos%20Aires,%20Argentina&output=embed">
        </iframe>
      </div>
      <button class="home-link" type="button" onclick="showPage('home')" aria-label="Inicio"></button>
      <button class="hotspot municipio" type="button" onclick="showPage('municipio')" aria-label="Municipio"></button>
      <button class="hotspot contacto" type="button" onclick="showPage('contacto')" aria-label="Contacto"></button>
      <button class="hotspot turismo" type="button" onclick="showPage('home')" aria-label="Turismo"></button>
      <button class="hotspot noticias" type="button" onclick="showPage('home')" aria-label="Noticias"></button>
      <a class="hotspot hcd" href="#hcd" aria-label="HCD">HCD</a>
    </section>

    <section class="page" id="hcd" aria-label="Honorable Concejo Deliberante">
      <img src="images/page_02.jpg" alt="Conformacion Honorable Concejo Deliberante General Lavalle">
      <button class="home-link" type="button" onclick="showPage('home')" aria-label="Inicio"></button>
      <button class="hotspot municipio" type="button" onclick="showPage('municipio')" aria-label="Municipio"></button>
      <button class="hotspot contacto" type="button" onclick="showPage('contacto')" aria-label="Contacto"></button>
      <button class="hotspot turismo" type="button" onclick="showPage('home')" aria-label="Turismo"></button>
      <button class="hotspot noticias" type="button" onclick="showPage('home')" aria-label="Noticias"></button>
      <a class="hotspot hcd" href="#hcd" aria-label="HCD">HCD</a>
    </section>

    <section class="page" id="contacto" aria-label="Contacto">
      <img src="images/page_03.jpg" alt="Guia de telefonos utiles de General Lavalle">
      <button class="home-link" type="button" onclick="showPage('home')" aria-label="Inicio"></button>
      <button class="hotspot municipio" type="button" onclick="showPage('municipio')" aria-label="Municipio"></button>
      <button class="hotspot contacto" type="button" onclick="showPage('contacto')" aria-label="Contacto"></button>
      <button class="hotspot turismo" type="button" onclick="showPage('home')" aria-label="Turismo"></button>
      <button class="hotspot noticias" type="button" onclick="showPage('home')" aria-label="Noticias"></button>
      <a class="hotspot hcd" href="#hcd" aria-label="HCD">HCD</a>
    </section>

    <section class="page" id="municipio" aria-label="Municipio">
      <img src="images/page_04.jpg" alt="Autoridades y ciudad de General Lavalle">
      <button class="home-link" type="button" onclick="showPage('home')" aria-label="Inicio"></button>
      <button class="hotspot municipio" type="button" onclick="showPage('municipio')" aria-label="Municipio"></button>
      <button class="hotspot contacto" type="button" onclick="showPage('contacto')" aria-label="Contacto"></button>
      <button class="hotspot turismo" type="button" onclick="showPage('home')" aria-label="Turismo"></button>
      <button class="hotspot noticias" type="button" onclick="showPage('home')" aria-label="Noticias"></button>
      <a class="hotspot hcd" href="#hcd" aria-label="HCD">HCD</a>
    </section>
  </main>

  <script>
    const validPages = new Set(['home', 'municipio', 'contacto', 'hcd']);

    function showPage(pageId, updateHash = true) {
      const target = validPages.has(pageId) ? pageId : 'home';
      document.querySelectorAll('.page').forEach((page) => {
        page.classList.toggle('active', page.id === target);
      });
      window.scrollTo({ top: 0, behavior: 'instant' });
      if (updateHash) {
        history.replaceState(null, '', target === 'home' ? location.pathname : `#${target}`);
      }
    }

    window.addEventListener('hashchange', () => {
      showPage(location.hash.slice(1) || 'home', false);
    });

    showPage(location.hash.slice(1) || 'home', false);
  </script>
</body>
</html>
