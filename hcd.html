<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HCD - Municipalidad de General Lavalle</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: auto;
    }

    .site {
      width: min(100%, 1920px);
      margin: 0 auto;
      position: relative;
      background: #cfeaf2;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
    }

    a {
      position: absolute;
      top: 3.25%;
      height: 2.7%;
      font-size: 0;
      color: transparent;
      text-decoration: none;
      z-index: 2;
      transition: transform 160ms ease;
    }

    a::after {
      content: "";
      position: absolute;
      inset: -18%;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 6px 16px rgba(16, 54, 70, 0.18);
      opacity: 0;
      transform: scale(0.94);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    a:hover {
      transform: translateY(-8%);
    }

    a:hover::after {
      opacity: 1;
      transform: scale(1);
    }

    a:active {
      transform: translateY(6%) scale(0.98);
    }

    .home-link {
      left: 2.7%;
      top: 1.8%;
      width: 18.2%;
      height: 6.0%;
    }

    .municipio { left: 34.0%; width: 9.5%; }
    .contacto { left: 43.5%; width: 8.8%; }
    .turismo { left: 52.3%; width: 7.7%; }
    .noticias { left: 60.0%; width: 7.4%; }
    .hcd { left: 68.2%; width: 6.0%; }

    @media (max-width: 768px) {
      body {
        background: #cfeaf2;
      }

      .site {
        width: 960px;
        max-width: none;
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <main class="site" aria-label="Honorable Concejo Deliberante">
    <img src="fronted/images/page_02.jpg" alt="Conformacion Honorable Concejo Deliberante General Lavalle">
    <a class="home-link" href="index.html" aria-label="Inicio">Inicio</a>
    <a class="municipio" href="index.html#municipio" aria-label="Municipio">Municipio</a>
    <a class="contacto" href="index.html#contacto" aria-label="Contacto">Contacto</a>
    <a class="turismo" href="index.html" aria-label="Turismo">Turismo</a>
    <a class="noticias" href="index.html" aria-label="Noticias">Noticias</a>
    <a class="hcd" href="index.html#hcd" aria-label="HCD">HCD</a>
  </main>
</body>
</html>
